general_settings:
  master_key: sk-proxy-master-key

model_list:
  - model_name: haiku
    litellm_params:
      model: openai/${RELAY_A_HAIKU_MODEL_ID}
      api_base: ${RELAY_A_BASE_URL}
      api_key: ${RELAY_A_KEY}

  - model_name: sonnet
    litellm_params:
      model: openai/${RELAY_A_SONNET_MODEL_ID}
      api_base: ${RELAY_A_BASE_URL}
      api_key: ${RELAY_A_KEY}

  - model_name: gpt5
    litellm_params:
      model: openai/${RELAY_B_GPT5_MODEL_ID}
      api_base: ${RELAY_B_BASE_URL}
      api_key: ${RELAY_B_KEY}
